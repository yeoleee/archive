    <script>
lucide.createIcons();

// =========================
// top btn
// =========================
const topBtn = document.querySelector('.btn_top');
const wrap = document.querySelector('.wrap');

// 스크롤 시 버튼 표시 (wrap 기준)
wrap.addEventListener('scroll', () => {
  if (wrap.scrollTop > 400) {
    topBtn.classList.add('is-visible');
  } else {
    topBtn.classList.remove('is-visible');
  }
});

// 클릭 시 최상단 스크롤 (wrap 기준)
topBtn.addEventListener('click', () => {
  wrap.scrollTo({
    top: 0,
    behavior: 'smooth'
  });
});


//하단 네비
document.addEventListener('DOMContentLoaded', () => {
  const wrap = document.querySelector('.btm_navi_wrap');
  const contactBtn = document.querySelector('.bottom_navi .mail');
  const closeBtn = document.querySelector('.close_btn');
  const navLinks = document.querySelectorAll('.bottom_navi a');

  let previousActive = document.querySelector('.bottom_navi a.active');

  if (!wrap || !contactBtn) return;

  // contact 클릭
  contactBtn.addEventListener('click', (e) => {
    e.preventDefault();

    const isOpen = wrap.classList.contains('is-open');

    if (!isOpen) {
      // 현재 active 기억
      previousActive = document.querySelector('.bottom_navi a.active');

      navLinks.forEach(a => a.classList.remove('active'));
      contactBtn.classList.add('active');
      wrap.classList.add('is-open');
    } else {
      closeContact();
    }
  });

  // X 버튼
  if (closeBtn) {
    closeBtn.addEventListener('click', (e) => {
      e.preventDefault();
      closeContact();
    });
  }

  function closeContact() {
    wrap.classList.remove('is-open');
    contactBtn.classList.remove('active');

    if (previousActive && previousActive !== contactBtn) {
      previousActive.classList.add('active');
    }
  }
});





//텍스트복사
document.getElementById('copyBtn').addEventListener('click', e => {
  e.preventDefault();

  const text = 'yeolee@kakao.com';

  navigator.clipboard.writeText(text).then(() => {
    alert('✅ 복사되었습니다.');
  });
});
//이미지 스크롤

const boxes = document.querySelectorAll('.img_inner');

boxes.forEach(box => {
  let speed = 0.5;
  let pauseTime = 1500;
  let isScrolling = true;

  function autoScroll() {
    if (!isScrolling) return;

    box.scrollTop += speed;

    if (box.scrollTop + box.clientHeight >= box.scrollHeight) {
      isScrolling = false;

      setTimeout(() => {
        box.scrollTo({
          top: 0,
          behavior: 'auto'
        });
        isScrolling = true;
      }, pauseTime);
    }
  }

  setInterval(autoScroll, 16);

  // hover 시 멈춤 (선택)
  box.addEventListener('mouseenter', () => isScrolling = false);
  box.addEventListener('mouseleave', () => isScrolling = true);
});

</script>
