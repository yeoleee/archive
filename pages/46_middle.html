<body>

                </div>
                <span>현재 연락을 이메일로 받고 있습니다.<br>아래 주소로 편하게 연락주세요.</span>

                    <div class="txt_form">yeolee@kakao.com</div>
                    <a href="#" class="copy" id="copyBtn">복사</a>
                </div>

            </div>
            <div class="bottom_navi">
            <a class="home" href="../index.html"><img src="../img/common/home.svg"></i>Home</a>
            <a class="about" href="../about.html"><img src="../img/common/info.svg">About</a>
            <a class="mail"><img src="../img/common/mail.svg">Contact</a>

        </div>
        <header class="header sub">
            <a href="../index.html"><i data-lucide="arrow-left" class="icon--md"></i></a>
            <span>오토앤 쇼핑몰 미들웨어 시스템 UI</span>
        </header>
        <div class="top_area">
            <img src="../img/sub/46_middle/device.png">         
        </div>
        <div class="container sub">
            <div class="inner">
               <ol class="tit">
                <li class="sm_tit">개요</li>
                <li class="lg_tit">오토앤 쇼핑몰 미들웨어 시스템 UI</li>
               </ol>
               <ul class="sum_area">
                <li>
                    <div class="left_tit">
                        <i data-lucide="calendar" class="icon--md"></i>
                        <span>Duration</span>
                    </div>
                    <span>2018</span>
                </li>
                <li>
                    <div class="left_tit">
                        <i data-lucide="tv-minimal" class="icon--md"></i>
                        <span>Type</span>
                    </div>
                    <span>PC 웹, 백오피스</span>
                </li>
                <li>
                    <div class="left_tit">
                        <i data-lucide="user" class="icon--md"></i>
                        <span>Role</span>
                    </div>
                    <span>참여율 100%</span>
                </li>
                
               </ul>
               <!--
               <a class="cta_btn" href="https://xd.adobe.com/view/f4f00413-f7ef-4f17-ad7e-a8a086d8b2bf-a1a3/" target="_blank">
                    프로토타입 보기<i data-lucide="arrow-up-right" class="icon--sm"></i>

              <img src="../img/sub/46_middle/middle_sub1.png" style="width: 100%;">
              <img src="../img/sub/46_middle/middle_sub2.png" style="width: 100%;">
              <img src="../img/sub/46_middle/middle_sub3.png" style="width: 100%;">
              <img src="../img/sub/46_middle/middle_sub4.png" style="width: 100%;">

        </div>
    </div>


    <script>
lucide.createIcons();

// =========================
// top btn
// =========================
const topBtn = document.querySelector('.btn_top');
const wrap = document.querySelector('.wrap');

// 스크롤 시 버튼 표시 (wrap 기준)
wrap.addEventListener('scroll', () => {
  if (wrap.scrollTop > 400) {
    topBtn.classList.add('is-visible');
  } else {
    topBtn.classList.remove('is-visible');
  }
});

// 클릭 시 최상단 스크롤 (wrap 기준)
topBtn.addEventListener('click', () => {
  wrap.scrollTo({
    top: 0,
    behavior: 'smooth'
  });
});


//하단 네비
document.addEventListener('DOMContentLoaded', () => {
  const wrap = document.querySelector('.btm_navi_wrap');
  const contactBtn = document.querySelector('.bottom_navi .mail');
  const closeBtn = document.querySelector('.close_btn');
  const navLinks = document.querySelectorAll('.bottom_navi a');

  let previousActive = document.querySelector('.bottom_navi a.active');

  if (!wrap || !contactBtn) return;

  // contact 클릭
  contactBtn.addEventListener('click', (e) => {
    e.preventDefault();

    const isOpen = wrap.classList.contains('is-open');

    if (!isOpen) {
      // 현재 active 기억
      previousActive = document.querySelector('.bottom_navi a.active');

      navLinks.forEach(a => a.classList.remove('active'));
      contactBtn.classList.add('active');
      wrap.classList.add('is-open');
    } else {
      closeContact();
    }
  });

  // X 버튼
  if (closeBtn) {
    closeBtn.addEventListener('click', (e) => {
      e.preventDefault();
      closeContact();
    });
  }

  function closeContact() {
    wrap.classList.remove('is-open');
    contactBtn.classList.remove('active');

    if (previousActive && previousActive !== contactBtn) {
      previousActive.classList.add('active');
    }
  }
});





//텍스트복사
document.getElementById('copyBtn').addEventListener('click', e => {
  e.preventDefault();

  const text = 'yeolee@kakao.com';

  navigator.clipboard.writeText(text).then(() => {
    alert('✅ 복사되었습니다.');
  });
});
    </script>

</body>

</html>
